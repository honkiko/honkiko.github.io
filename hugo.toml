baseURL = "https://example.org/"
locale = "zh-CN"
defaultContentLanguage = "zh_hans"
title = "HongZhiguo's blog"
theme = "hugo-theme-stack"

[languages.zh_hans]
label = "简体中文"
locale = "zh-Hans-CN"
direction = "ltr"
title = "志国"
weight = 1

[languages.en]
label = "English"
locale = "en-US"
weight = 2
title = "HongZhiguo's blog"

[markup.tableOfContents]
  startLevel = 1
  endLevel = 6
  ordered = false

[taxonomies]
  tag = "tags"
  category = "categories"

[params]
  [params.widgets]
    left = [
      { type = "tag-cloud", params = { limit = 20 } }
    ]
    homepage = []
    page = [
      { type = "toc" }
    ]

[permalinks]
  post = "/p/:slug/"
  page = "/:slug/"
